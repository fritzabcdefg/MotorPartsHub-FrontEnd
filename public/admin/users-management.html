<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>User Accounts - Management Hub</title>
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/jquery.dataTables.min.css">
  <style>
    body { background-color: #05020a; color: #ffffff; font-family: 'Segoe UI', Arial, sans-serif; padding: 20px; }
    .panel-card { background-color: #090314; border: 1px solid rgba(168, 107, 255, 0.2); border-radius: 12px; padding: 24px; max-width: 1200px; margin: 0 auto; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.7); }
    .panel-header-row { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid rgba(168, 107, 255, 0.3); padding-bottom: 12px; margin-bottom: 20px; }
    .btn-back { background: rgba(168, 107, 255, 0.1); border: 1px solid #a86bff; color: #fff; padding: 8px 16px; border-radius: 6px; text-decoration: none; font-weight: bold; transition: 0.2s; }
    .btn-back:hover { background: #a86bff; }
    .table { width: 100% !important; color: #fff !important; margin-top: 15px; border-collapse: collapse; }
    .table th { background-color: rgba(168, 107, 255, 0.2) !important; color: #ffffff !important; padding: 12px !important; border-bottom: 2px solid #a86bff !important; text-align: left; }
    .table td { padding: 12px !important; border-bottom: 1px solid rgba(255, 255, 255, 0.08) !important; }
    .dataTables_wrapper .dataTables_length, .dataTables_wrapper .dataTables_filter, .dataTables_wrapper .dataTables_info, .dataTables_wrapper .dataTables_paginate { color: #b3a1d9 !important; margin: 12px 0; }
    .dataTables_wrapper .dataTables_filter input, .dataTables_wrapper .dataTables_length select, select { background-color: #140d26 !important; color: #fff !important; border: 1px solid rgba(168, 107, 255, 0.4) !important; padding: 6px; border-radius: 4px; }
    .dataTables_wrapper .dataTables_paginate .paginate_button { color: #fff !important; background: rgba(168, 107, 255, 0.1) !important; border: 1px solid rgba(168, 107, 255, 0.3) !important; margin-right: 4px; border-radius: 4px; }
    .dataTables_wrapper .dataTables_paginate .paginate_button.current { background: #a86bff !important; border-color: #a86bff !important; }
    .btn-deactivate { background-color: #d9534f; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
    .status-badge { padding: 4px 8px; border-radius: 12px; font-size: 0.85rem; font-weight: bold; }
    .status-badge.active { background-color: rgba(76, 175, 80, 0.2); color: #4caf50; }
    .status-badge.inactive { background-color: rgba(244, 67, 54, 0.2); color: #f44336; }
  </style>
</head>
<body>
  <main class="panel-card">
    <div class="panel-header-row">
      <h2>User Accounts Control Panel</h2>
        <a href="/admin/dashboard.html" class="btn-back">← Back to Dashboard</a>    </div>
    <div id="tableContainer">Loading System Users Database...</div>
  </main>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/user.js"></script>
  <script>
    $(document).ready(function() {
        User.initSession();
        if(!User.isLoggedIn()) { window.location.href = '/login.html'; return; }
        
        function loadUsers() {
            const token = User.getToken();
            api.get('/api/v1/users', { headers: { 'Authorization': `Bearer ${token}` } })
            .then(res => renderTable(res.data.users || res.data || []))
            .catch(() => $('#tableContainer').html('<p style="color:red">Failed to load user records.</p>'));
        }

        function renderTable(users) {
            let html = `<table id="usersTable" class="table">
                <thead><tr><th>ID</th><th>Email</th><th>Role</th><th>Status</th><th>Actions</th></tr></thead>
                <tbody>${users.map(u => `
                    <tr>
                        <td>${u.id || u._id}</td><td>${u.email}</td>
                        <td>
                            <select class="role-select" data-user-id="${u.id || u._id}">
                                <option value="user" ${u.role === 'user'?'selected':''}>User</option>
                                <option value="admin" ${u.role === 'admin'?'selected':''}>Admin</option>
                            </select>
                        </td>
                        <td><span class="status-badge ${u.active !== false ? 'active' : 'inactive'}">${u.active !== false ? 'Active' : 'Inactive'}</span></td>
                        <td>${u.active !== false ? `<button class="btn-deactivate" data-email="${u.email}">Deactivate</button>` : ''}</td>
                    </tr>`).join('')}</tbody></table>`;
            $('#tableContainer').html(html);
            $('#usersTable').DataTable({ "destroy": true, "pageLength": 10 });
            
            $('.role-select').change(function() {
                const token = User.getToken();
                api.put(`/api/v1/users/${$(this).data('user-id')}/role`, { role: $(this).val() }, { headers: { 'Authorization': `Bearer ${token}` } })
                .then(() => alert('Role updated setup.')).catch(() => alert('Update failed.'));
            });

            $('.btn-deactivate').click(function() {
                if(confirm('Confirm account deactivation?')) {
                    const token = User.getToken();
                    api.delete('/api/v1/deactivate', { data: { email: $(this).data('email') }, headers: { 'Authorization': `Bearer ${token}` } })
                    .then(() => { alert('Account Deactivated.'); loadUsers(); });
                }
            });
        }
        loadUsers();
    });
  </script>
</body>
</html>
