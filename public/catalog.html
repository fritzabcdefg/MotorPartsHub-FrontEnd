<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Shop Parts - MotorPartsHub</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div id="header"></div>

  <main class="catalog-shell">
    <div class="catalog-toolbar">
      <div class="catalog-search-field">
        <svg class="catalog-search-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"></circle>
          <path d="M21 21l-4.35-4.35"></path>
        </svg>
        <input type="text" id="catalogSearch" placeholder="Search parts, e.g. brake pads...">
      </div>
      <div class="catalog-sort-field">
        <label for="catalogSort">Sort</label>
        <select id="catalogSort">
          <option value="default">Bestselling</option>
          <option value="name-asc">Name: A-Z</option>
          <option value="price-asc">Price: Low to High</option>
          <option value="price-desc">Price: High to Low</option>
        </select>
      </div>
    </div>

    <div class="catalog-layout">
      <aside class="catalog-filters">
        <h3>Category</h3>
        <div id="categoryFilterList" class="filter-list">
          <label class="filter-item">
            <input type="checkbox" value="all" checked>
            <span>All Parts</span>
          </label>
        </div>

        <h3>Availability</h3>
        <div class="filter-list">
          <label class="filter-item">
            <input type="checkbox" id="inStockOnly">
            <span>In stock only</span>
          </label>
        </div>
      </aside>

      <section class="catalog-results">
        <div class="catalog-results-header">
          <span id="resultCount" class="result-count">Loading parts...</span>
        </div>
        <div id="catalogGrid" class="catalog-grid"></div>
      </section>
    </div>
    <div class="item-modal-overlay" id="itemModalOverlay">
    <div class="item-modal" id="itemModal">
      <button class="item-modal-close" id="itemModalClose" aria-label="Close">&times;</button>
      <div id="itemModalBody"><!-- populated by item.js --></div>
  </div>
</div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/user.js"></script>
  <script src="/js/header.js"></script>
  <script src="/js/item.js"></script>
  <script>
    fetch('header.html')
      .then(r => r.text())
      .then(t => {
        document.getElementById('header').innerHTML = t;
        if (window.initHeaderNav) window.initHeaderNav();
      });
  </script>
</body>
</html>
