<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Profile - MotorPartsHub</title>
  <!-- Custom Midnight Violet Stylesheet -->
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <!-- Global Navigation Injector -->
  <div id="header"></div>

  <!-- Primary Page Wrapper Layout -->
  <main class="page-shell">
    <div class="row">
      
      <!-- Left Column: User Account Banner Card -->
      <section class="col col-md-4">
        <div class="card text-center mb-4">
          <div style="display: flex; flex-direction: column; align-items: center;">
            <!-- Avatar Display Image -->
            <img id="avatarPreview" src="/img/default-avatar.png" alt="Profile Avatar">
            <input type="file" id="avatarUpload" accept="image/*" style="display: none;">
            <label for="avatarUpload" id="uploadBtnLabel" class="btn btn-outline" style="display: none; margin-top: 10px; padding: 5px 15px; cursor: pointer;">Upload Photo</label>
            <h2 id="displayUserName" class="mb-2">Loading...</h2>
            <p id="displayEmail" class="muted mb-4">...</p>
          </div>
          
          <hr style="border-color: rgba(168, 107, 255, 0.15); margin: 16px 0;">
          
          <!-- Badges Area -->
          <div style="display: flex; justify-content: center; gap: 10px; flex-wrap: wrap;">
            <span id="badgeRole" class="status-badge active" style="background: rgba(111, 62, 255, 0.15); color: var(--accent); border-color: rgba(111, 62, 255, 0.3);">User</span>
            <span id="badgeActive" class="status-badge active">Active</span>
          </div>
        </div>
      </section>

      <!-- Right Column: Profile Root Form Context -->
      <section class="col col-md-8">
        <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
          <h1 style="margin: 0;">Account Details</h1>
          <button type="button" id="toggleEditBtn" class="btn btn-outline" style="padding: 5px 15px; cursor: pointer;">Edit Profile</button>
        </div>          
        <p class="muted mb-4">Manage your builder credentials and default transport routing information below.</p>
                  
          <!-- Dynamic Content Root Targeted by user.js -->
          <div id="profileRoot">
            <form id="profileForm">
              
              <!-- Section A: Base Identity Details -->
              <h3 class="mb-2" style="color: var(--accent); font-size: 1.1rem; text-transform: uppercase; letter-spacing: 0.5px;">Core Authentication Data</h3>
              <div class="row mb-4">
                <div class="col">
                  <label for="email">Email Address</label>
                  <input type="email" id="email" readonly disabled>
                </div>
                <div class="col">
                  <label for="password">Password</label>
                  <input type="password" id="password" class="profile-field" placeholder="••••••••" disabled>
                </div>
              </div>

              <h3 class="mb-2" style="color: var(--accent); font-size: 1.1rem; text-transform: uppercase; letter-spacing: 0.5px;">Shipping & Contact Information</h3>

              <div class="row mb-2">
                <div class="col" style="flex: 0 0 20%;">
                  <label for="title">Title</label>
                  <select id="title" class="profile-field" disabled>
                    <option value="Mr.">Mr.</option>
                    <option value="Ms.">Ms.</option>
                    <option value="Mrs.">Mrs.</option>
                    <option value="Dr.">Dr.</option>
                  </select>
                </div>
                <div class="col">
                  <label for="fname">First Name</label>
                  <input type="text" id="fname" class="profile-field" placeholder="First Name" disabled>
                </div>
                <div class="col">
                  <label for="lname">Last Name</label>
                  <input type="text" id="lname" class="profile-field" placeholder="Last Name" disabled>
                </div>
              </div>

              <div class="row mb-2">
                <div class="col">
                  <label for="phone">Phone Number</label>
                  <input type="text" id="phone" class="profile-field" placeholder="Contact number" disabled>
                </div>
              </div>

              <div class="row mb-2">
                <div class="col">
                  <label for="addressline">Address Line</label>
                  <textarea id="addressline" class="profile-field" rows="2" placeholder="House/Lot No., Street, Barangay" disabled></textarea>
                </div>
              </div>

              <div class="row mb-4">
                <div class="col">
                  <label for="town">Town / City</label>
                  <input type="text" id="town" class="profile-field" placeholder="City / Municipality" disabled>
                </div>
                <div class="col">
                  <label for="zipcode">Zip Code</label>
                  <input type="text" id="zipcode" class="profile-field" placeholder="Postal Code" disabled>
                </div>
              </div>
              <div id="saveActions" style="text-align: right; display: none;">
                <button type="button" id="cancelEditBtn" class="btn btn-ghost mr-2" style="background: transparent; border: 1px solid #fff; color: #fff; padding: 5px 15px;">Cancel</button>
                <input type="submit" value="Save Changes" style="max-width: 200px;">
              </div>

            </form>
          </div>
        </div>
      </section>
    </div>
  </main>

  <!-- Core Script Implementations & Dependency Initializations -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

  <script>
  axios.interceptors.request.use((config) => {
    const token = localStorage.getItem('token');
    if (token) config.headers.Authorization = `Bearer ${token}`;
    return config;
  });
  </script>

  <script src="/js/user.js"></script>
  <script src="/js/header.js"></script>
  <script src="/js/api.js"></script>
  
  <!-- Consolidated Flowchart Logic Controller Block -->
<script>
  // Attach JWT token to every axios request
  axios.interceptors.request.use((config) => {
    const token = localStorage.getItem('token');
    if (token) config.headers.Authorization = `Bearer ${token}`;
    return config;
  });

  // Global state parameters tracking user changes
  let isEditMode = false;
  let currentUserId = null;
  let uploadedFile = null;

  document.addEventListener("DOMContentLoaded", () => {

    // --- 1. DOM Element Definitions ---
    const toggleEditBtn = document.getElementById('toggleEditBtn');
    const cancelEditBtn = document.getElementById('cancelEditBtn');
    const saveActions = document.getElementById('saveActions');
    const uploadBtnLabel = document.getElementById('uploadBtnLabel');
    const avatarUpload = document.getElementById('avatarUpload');
    const avatarPreview = document.getElementById('avatarPreview');
    const profileForm = document.getElementById('profileForm');
    const loadOrdersBtn = document.getElementById('loadOrdersBtn');
    const ordersContainer = document.getElementById('ordersContainer');
    const tableBody = document.getElementById('ordersTableBody');
    const inputs = document.querySelectorAll('.profile-field, select#title');

    // --- 2. Initial Data Load: Pull from DB into View Mode (Default) ---
    axios.get('/api/v1/users/profile')
      .then(res => {
        const { user, customerDetails } = res.data;

        if (user) {
          currentUserId = user.id;
          // CHANGED: email replaces username; password intentionally left blank
          document.getElementById('email').value = user.email || '';
          document.getElementById('displayEmail').innerText = user.email || '';
          document.getElementById('badgeRole').innerText = user.role || 'User';
        }

        if (customerDetails) {
          document.getElementById('title').value = customerDetails.title || 'Mr.';
          document.getElementById('fname').value = customerDetails.fname || '';
          document.getElementById('lname').value = customerDetails.lname || '';
          document.getElementById('phone').value = customerDetails.phone || '';
          document.getElementById('addressline').value = customerDetails.addressline || '';
          document.getElementById('town').value = customerDetails.town || '';
          document.getElementById('zipcode').value = customerDetails.zipcode || '';

          // CHANGED: display name built from customers fname/lname, not users.name
          const fullName = `${customerDetails.fname || ''} ${customerDetails.lname || ''}`.trim();
          document.getElementById('displayUserName').innerText = fullName || 'Builder';

          if (customerDetails.image) {
            avatarPreview.src = customerDetails.image;
          }
        }
      })
      .catch(err => {
        console.error("Database connection failed or user session expired:", err);
      });

    // Global Navigation Injector
    fetch('header.html')
      .then(r => r.text())
      .then(t => {
        document.getElementById('header').innerHTML = t;
        if (window.initHeaderNav) window.initHeaderNav();
      });

    // ADDED: snapshot of original DB values, restored on cancel
    let originalData = {};

    function snapshotFields() {
      originalData = {
        title:       document.getElementById('title').value,
        fname:       document.getElementById('fname').value,
        lname:       document.getElementById('lname').value,
        phone:       document.getElementById('phone').value,
        addressline: document.getElementById('addressline').value,
        town:        document.getElementById('town').value,
        zipcode:     document.getElementById('zipcode').value,
        avatar:      avatarPreview.src
      };
    }

    function restoreFields() {
      document.getElementById('title').value       = originalData.title       || 'Mr.';
      document.getElementById('fname').value       = originalData.fname       || '';
      document.getElementById('lname').value       = originalData.lname       || '';
      document.getElementById('phone').value       = originalData.phone       || '';
      document.getElementById('addressline').value = originalData.addressline || '';
      document.getElementById('town').value        = originalData.town        || '';
      document.getElementById('zipcode').value     = originalData.zipcode     || '';
      avatarPreview.src                            = originalData.avatar;
      uploadedFile = null; // discard any staged file
    }

    // --- 3. View / Edit State Toggle Engine ---
    function toggleMode(editActive) {
      isEditMode = editActive;
      inputs.forEach(input => input.disabled = !editActive);
      saveActions.style.display  = editActive ? 'block'        : 'none';
      uploadBtnLabel.style.display = editActive ? 'inline-block' : 'none';
      toggleEditBtn.style.display  = editActive ? 'none'         : 'block';

      if (editActive) {
        snapshotFields(); // ADDED: take snapshot the moment edit mode opens
      } else {
        restoreFields();  // ADDED: revert all fields to snapshot on cancel
        document.getElementById('password').value = ''; // always clear password on exit
      }
    }

    if (toggleEditBtn) toggleEditBtn.addEventListener('click', () => toggleMode(true));
    if (cancelEditBtn) cancelEditBtn.addEventListener('click', () => toggleMode(false));

    // --- 4. Image Upload Preview Handling ---
    if (avatarUpload) {
      avatarUpload.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
          uploadedFile = file;
          const reader = new FileReader();
          reader.onload = (e) => avatarPreview.src = e.target.result;
          reader.readAsDataURL(file);
        }
      });
    }

    // --- 5. Save Action Submission Protocol ---
    if (profileForm) {
      profileForm.addEventListener('submit', async function(e) {
        e.preventDefault();

        const formData = new FormData();
        formData.append('userId', currentUserId);
        formData.append('title', document.getElementById('title').value);
        formData.append('fname', document.getElementById('fname').value);
        formData.append('lname', document.getElementById('lname').value);
        formData.append('phone', document.getElementById('phone').value);
        formData.append('addressline', document.getElementById('addressline').value);
        formData.append('town', document.getElementById('town').value);
        formData.append('zipcode', document.getElementById('zipcode').value);

        // ADDED: only send password if user actually typed a new one
        const newPassword = document.getElementById('password').value.trim();
        if (newPassword) {
          formData.append('password', newPassword);
        }

        if (uploadedFile) {
          formData.append('avatar', uploadedFile);
        }

        try {
          const res = await axios.put('/api/v1/users/profile', formData, {
            headers: { 'Content-Type': 'multipart/form-data' }
          });

        if (res.data.success) {
          alert('Profile updated successfully!');
          document.getElementById('password').value = '';
          toggleMode(false);
          snapshotFields(); 
        }
        } catch (err) {
          alert(err.response?.data?.message || 'Failed saving profile data changes.');
        }
      });
    }

    // --- 6. Order History Render Engine ---
    if (loadOrdersBtn) {
      loadOrdersBtn.addEventListener('click', async () => {
        if (ordersContainer.style.display === 'block') {
          ordersContainer.style.display = 'none';
          return;
        }

        try {
          const res = await axios.get(`/api/orders/my-orders?userId=${currentUserId}`);
          const orders = res.data.orders;

          tableBody.innerHTML = '';
          if (!orders || orders.length === 0) {
            tableBody.innerHTML = '<tr><td colspan="5" style="text-align:center;">No orders found.</td></tr>';
          } else {
            orders.forEach(order => {
              const actionBtn = order.status === 'Delivered'
                ? `<button class="btn btn-sm btn-outline" onclick="openReviewModal(${order.orderinfo_id})">Leave Review</button>`
                : `<span class="muted">N/A</span>`;

              tableBody.innerHTML += `
                <tr>
                  <td>#${order.orderinfo_id}</td>
                  <td>${order.date_placed}</td>
                  <td>₱${order.total}</td>
                  <td><span class="status-badge">${order.status}</span></td>
                  <td>${actionBtn}</td>
                </tr>
              `;
            });
          }
          ordersContainer.style.width = "100%"; // FIXED: was style.with (typo)
          ordersContainer.style.display = 'block';
        } catch (err) {
          alert('Failed to load order history records.');
        }
      });
    }
  });

  window.openReviewModal = function(orderId) {
    alert(`Trigger review modal for Order #${orderId}. Build your modal UI here!`);
  }
</script>
</body>
</html>
