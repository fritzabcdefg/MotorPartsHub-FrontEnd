<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Profile - MotorPartsHub</title>
  <!-- Custom Midnight Violet Stylesheet -->
  <link rel="stylesheet" href="../css/style.css">
  <style>
    /* Compact utility styles for the side order table */
    .orders-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
      margin-top: 10px;
    }
    .orders-table th {
      color: var(--accent, #a86bff);
      border-bottom: 1px solid rgba(168, 107, 255, 0.2);
      padding: 6px;
      text-align: left;
    }
    .orders-table td {
      padding: 8px 6px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      vertical-align: middle;
    }
    .action-btn-group {
      display: flex;
      gap: 4px;
      justify-content: flex-end;
    }
    .btn-xs {
      padding: 2px 6px;
      font-size: 0.75rem;
      cursor: pointer;
    }
    /* Modal Styles */
    .portal-modal {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.85);
      z-index: 9999;
      justify-content: center;
      align-items: center;
    }
    .portal-modal-content {
      background: #1a1625;
      border: 1px solid #a86bff;
      padding: 20px;
      max-width: 500px;
      width: 90%;
      position: relative;
      border-radius: 6px;
    }
    .close-modal-btn {
      position: absolute;
      top: 10px;
      right: 15px;
      background: none;
      border: none;
      color: #fff;
      font-size: 1.5rem;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- Global Navigation Injector -->
  <div id="header"></div>

  <!-- Primary Page Wrapper Layout -->
  <main class="page-shell">
    <div class="row">
      
      <!-- Left Column: User Account Banner Card & Orders Table -->
      <section class="col col-md-4">
        <div class="card text-center mb-4">
          <div style="display: flex; flex-direction: column; align-items: center;">
            <!-- Avatar Display Image -->
            <img id="avatarPreview" src="/img/default-avatar.png" alt="Profile Avatar">
            <input type="file" id="avatarUpload" accept="image/*" style="display: none;">
            <label for="avatarUpload" id="uploadBtnLabel" class="btn btn-outline" style="display: none; margin-top: 10px; padding: 5px 15px; cursor: pointer;">Upload Photo</label>
            <h2 id="displayUserName" class="mb-2">Loading...</h2>
            <p id="displayEmail" class="muted mb-4">...</p>
          </div>
          
          <hr style="border-color: rgba(168, 107, 255, 0.15); margin: 16px 0;">
          
          <!-- Badges Area -->
          <div style="display: flex; justify-content: center; gap: 10px; flex-wrap: wrap;">
            <span id="badgeRole" class="status-badge active" style="background: rgba(111, 62, 255, 0.15); color: var(--accent); border-color: rgba(111, 62, 255, 0.3);">User</span>
            <span id="badgeActive" class="status-badge active">Active</span>
          </div>
        </div>

        <!-- Orders Placement Section Below Profile Context -->
        <div class="card">
          <h3 style="color: var(--accent); font-size: 1.1rem; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px;">Order History</h3>
          <div id="ordersContainer" style="max-height: 400px; overflow-y: auto;">
            <table class="orders-table">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Total</th>
                  <th>Status</th>
                  <th style="text-align: right;">Actions</th>
                </tr>
              </thead>
              <tbody id="ordersTableBody">
                <tr>
                  <td colspan="4" style="text-align: center;" class="muted">Loading orders...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </section>

      <!-- Right Column: Profile Root Form Context -->
      <section class="col col-md-8">
        <div class="card">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h1 style="margin: 0;">Account Details</h1>
            <button type="button" id="toggleEditBtn" class="btn btn-outline" style="padding: 5px 15px; cursor: pointer;">Edit Profile</button>
          </div>          
          <p class="muted mb-4">Manage your builder credentials and default transport routing information below.</p>
                    
          <!-- Dynamic Content Root Targeted by user.js -->
          <div id="profileRoot">
            <form id="profileForm">
              
              <!-- Section A: Base Identity Details -->
              <h3 class="mb-2" style="color: var(--accent); font-size: 1.1rem; text-transform: uppercase; letter-spacing: 0.5px;">Core Authentication Data</h3>
              <div class="row mb-4">
                <div class="col">
                  <label for="email">Email Address</label>
                  <input type="email" id="email" readonly disabled>
                </div>
                <div class="col">
                  <label for="password">Password</label>
                  <input type="password" id="password" class="profile-field" placeholder="••••••••" disabled>
                </div>
              </div>

              <h3 class="mb-2" style="color: var(--accent); font-size: 1.1rem; text-transform: uppercase; letter-spacing: 0.5px;">Shipping & Contact Information</h3>

              <div class="row mb-2">
                <div class="col" style="flex: 0 0 20%;">
                  <label for="title">Title</label>
                  <select id="title" class="profile-field" disabled>
                    <option value="Mr.">Mr.</option>
                    <option value="Ms.">Ms.</option>
                    <option value="Mrs.">Mrs.</option>
                    <option value="Dr.">Dr.</option>
                  </select>
                </div>
                <div class="col">
                  <label for="fname">First Name</label>
                  <input type="text" id="fname" class="profile-field" placeholder="First Name" disabled>
                </div>
                <div class="col">
                  <label for="lname">Last Name</label>
                  <input type="text" id="lname" class="profile-field" placeholder="Last Name" disabled>
                </div>
              </div>

              <div class="row mb-2">
                <div class="col">
                  <label for="phone">Phone Number</label>
                  <input type="text" id="phone" class="profile-field" placeholder="Contact number" disabled>
                </div>
              </div>

              <div class="row mb-2">
                <div class="col">
                  <label for="addressline">Address Line</label>
                  <textarea id="addressline" class="profile-field" rows="2" placeholder="House/Lot No., Street, Barangay" disabled></textarea>
                </div>
              </div>

              <div class="row mb-4">
                <div class="col">
                  <label for="town">Town / City</label>
                  <input type="text" id="town" class="profile-field" placeholder="City / Municipality" disabled>
                </div>
                <div class="col">
                  <label for="zipcode">Zip Code</label>
                  <input type="text" id="zipcode" class="profile-field" placeholder="Postal Code" disabled>
                </div>
              </div>
              <div id="saveActions" style="text-align: right; display: none;">
                <button type="button" id="cancelEditBtn" class="btn btn-ghost mr-2" style="background: transparent; border: 1px solid #fff; color: #fff; padding: 5px 15px;">Cancel</button>
                <input type="submit" value="Save Changes" style="max-width: 200px;">
              </div>

            </form>
          </div>
        </div>
      </section>
    </div>
  </main>

  <!-- Dynamic Content Modal View Overlay (Details & Reviews) -->
  <div id="portalModal" class="portal-modal">
    <div class="portal-modal-content">
      <button class="close-modal-btn" onclick="closePortalModal()">&times;</button>
      <div id="modalPortalTarget"></div>
    </div>
  </div>

  <!-- Core Script Implementations & Dependency Initializations -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

  <!-- Global Notification System — must load before any script that calls notify() -->
  <script src="/js/notify.js"></script>

  <script>
  axios.interceptors.request.use((config) => {
    const token = localStorage.getItem('token');
    if (token) config.headers.Authorization = `Bearer ${token}`;
    return config;
  });
  </script>

  <script src="/js/user.js"></script>
  <script src="/js/header.js"></script>
  <script src="/js/api.js"></script>
  
  <!-- Consolidated Flowchart Logic Controller Block -->
<script>
  // Global state parameters tracking user changes
  let isEditMode = false;
  let currentUserId = null;
  let uploadedFile = null;

  document.addEventListener("DOMContentLoaded", () => {

    // --- 1. DOM Element Definitions ---
    const toggleEditBtn = document.getElementById('toggleEditBtn');
    const cancelEditBtn = document.getElementById('cancelEditBtn');
    const saveActions = document.getElementById('saveActions');
    const uploadBtnLabel = document.getElementById('uploadBtnLabel');
    const avatarUpload = document.getElementById('avatarUpload');
    const avatarPreview = document.getElementById('avatarPreview');
    const profileForm = document.getElementById('profileForm');
    const inputs = document.querySelectorAll('.profile-field, select#title');

    // --- 2. Initial Data Load: Pull from DB into View Mode (Default) ---
    axios.get('/api/v1/users/profile')
      .then(res => {
        const { user, customerDetails } = res.data;

        if (user) {
          currentUserId = user.id;
          document.getElementById('email').value = user.email || '';
          document.getElementById('displayEmail').innerText = user.email || '';
          document.getElementById('badgeRole').innerText = user.role || 'User';

          // Automatically trigger loading user specific orders upon retrieving identity
          loadOrderHistory(user.id);
        }

        if (customerDetails) {
          document.getElementById('title').value = customerDetails.title || 'Mr.';
          document.getElementById('fname').value = customerDetails.fname || '';
          document.getElementById('lname').value = customerDetails.lname || '';
          document.getElementById('phone').value = customerDetails.phone || '';
          document.getElementById('addressline').value = customerDetails.addressline || '';
          document.getElementById('town').value = customerDetails.town || '';
          document.getElementById('zipcode').value = customerDetails.zipcode || '';

          const fullName = `${customerDetails.fname || ''} ${customerDetails.lname || ''}`.trim();
          document.getElementById('displayUserName').innerText = fullName || 'Builder';

          if (customerDetails.image) {
            avatarPreview.src = customerDetails.image;
          }
        }
      })
      .catch(err => {
        console.error("Database connection failed or user session expired:", err);
      });

    // Global Navigation Injector
    fetch('header.html')
      .then(r => r.text())
      .then(t => {
        document.getElementById('header').innerHTML = t;
        if (window.initHeaderNav) window.initHeaderNav();
      });

    let originalData = {};

    function snapshotFields() {
      originalData = {
        title:       document.getElementById('title').value,
        fname:       document.getElementById('fname').value,
        lname:       document.getElementById('lname').value,
        phone:       document.getElementById('phone').value,
        addressline: document.getElementById('addressline').value,
        town:        document.getElementById('town').value,
        zipcode:     document.getElementById('zipcode').value,
        avatar:      avatarPreview.src
      };
    }

    function restoreFields() {
      if (originalData.title) {
        document.getElementById('title').value       = originalData.title;
        document.getElementById('fname').value       = originalData.fname;
        document.getElementById('lname').value       = originalData.lname;
        document.getElementById('phone').value       = originalData.phone;
        document.getElementById('addressline').value = originalData.addressline;
        document.getElementById('town').value        = originalData.town;
        document.getElementById('zipcode').value     = originalData.zipcode;
        avatarPreview.src                            = originalData.avatar;
      }
      uploadedFile = null; 
    }

    // --- 3. View / Edit State Toggle Engine ---
    function toggleMode(editActive) {
      isEditMode = editActive;
      inputs.forEach(input => input.disabled = !editActive);
      saveActions.style.display  = editActive ? 'block'        : 'none';
      uploadBtnLabel.style.display = editActive ? 'inline-block' : 'none';
      toggleEditBtn.style.display  = editActive ? 'none'         : 'block';

      if (editActive) {
        snapshotFields(); 
      } else {
        restoreFields();  
        document.getElementById('password').value = ''; 
      }
    }

    if (toggleEditBtn) toggleEditBtn.addEventListener('click', () => toggleMode(true));
    if (cancelEditBtn) cancelEditBtn.addEventListener('click', () => toggleMode(false));

    // --- 4. Image Upload Preview Handling ---
    if (avatarUpload) {
      avatarUpload.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
          uploadedFile = file;
          const reader = new FileReader();
          reader.onload = (e) => avatarPreview.src = e.target.result;
          reader.readAsDataURL(file);
        }
      });
    }

    // --- 5. Save Action Submission Protocol ---
    if (profileForm) {
      profileForm.addEventListener('submit', async function(e) {
        e.preventDefault();

        const formData = new FormData();
        formData.append('userId', currentUserId);
        formData.append('title', document.getElementById('title').value);
        formData.append('fname', document.getElementById('fname').value);
        formData.append('lname', document.getElementById('lname').value);
        formData.append('phone', document.getElementById('phone').value);
        formData.append('addressline', document.getElementById('addressline').value);
        formData.append('town', document.getElementById('town').value);
        formData.append('zipcode', document.getElementById('zipcode').value);

        const newPassword = document.getElementById('password').value.trim();
        if (newPassword) {
          formData.append('password', newPassword);
        }

        if (uploadedFile) {
          formData.append('avatar', uploadedFile);
        }

        try {
          const res = await axios.put('/api/v1/users/profile', formData, {
            headers: { 'Content-Type': 'multipart/form-data' }
          });

          if (res.data.success) {
            notify('Profile updated successfully!', 'success');
            document.getElementById('password').value = '';
            toggleMode(false);
            snapshotFields(); 
          }
        } catch (err) {
          notify(err.response?.data?.message || 'Failed saving profile data changes.', 'error');
        }
      });
    }

    // --- 6. Order History Data Engine Fetcher ---
    async function loadOrderHistory(userId) {
      const tableBody = document.getElementById('ordersTableBody');
      try {
        const res = await axios.get(`/api/v1/orders/my-orders?userId=${currentUserId}`);        
        const orders = res.data.orders;

        tableBody.innerHTML = '';
        if (!orders || orders.length === 0) {
          tableBody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:15px;" class="muted">No orders found.</td></tr>';
          return;
        }

        orders.forEach(order => {
          // Display Review option strictly IF DELIVERED
          const reviewBtn = order.status === 'Delivered'
            ? `<button class="btn btn-xs btn-outline" onclick="openReviewModal(${order.orderinfo_id})">Review</button>`
            : '';

          tableBody.innerHTML += `
            <tr>
              <td>#${order.orderinfo_id}</td>
              <td>₱${parseFloat(order.total).toFixed(2)}</td>
              <td><span class="status-badge" style="font-size:0.75rem; color: #b3a1d9;">${order.status}</span></td>
              <td>
                <div class="action-btn-group">
                  <button class="btn btn-xs" onclick="viewOrderDetails(${order.orderinfo_id})" title="View Details">View</button>
                  ${reviewBtn}
                </div>
              </td>
            </tr>
          `;
        });
      } catch (err) {
        console.error(err);
        tableBody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:red; padding:15px;">Failed to load order history.</td></tr>';
      }
    }

    // Attach order list loading logic to window reference for consistency
    window.refreshProfileOrders = () => loadOrderHistory(currentUserId);
  });

  // --- 7. Window Scoped Modal View Handlers ---
  window.viewOrderDetails = async function(orderId) {
    const modal = document.getElementById('portalModal');
    const target = document.getElementById('modalPortalTarget');
    modal.style.display = 'flex';
    target.innerHTML = '<p class="muted">Loading complete manifest breakdown...</p>';

    try {
      // Direct call setup assuming router permissions verify token updates are handled
      const res = await axios.get(`/api/v1/orders/${orderId}`);
      const { customer, items } = res.data;

      let layoutItems = items.map(i => `
        <div style="display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.9rem;">
          <span>${i.itemName} <strong>(x${i.qty})</strong></span>
          <span>₱${parseFloat(i.subTotal).toFixed(2)}</span>
        </div>
      `).join('');

      target.innerHTML = `
        <h3 style="color: var(--accent); margin-top: 0; margin-bottom: 5px;">Order Manifest Details</h3>
        <p class="muted" style="font-size: 0.8rem; margin-bottom: 15px;">Ref ID: #MPH-${orderId}</p>
        <div style="border-bottom: 1px solid rgba(168, 107, 255, 0.15); padding-bottom: 10px; margin-bottom: 15px; font-size: 0.85rem;">
          <strong>Recipient:</strong> ${customer.customerName || 'N/A'}<br>
          <strong>Destination:</strong> ${customer.shippingAddress || ''}, ${customer.town || ''} ${customer.zipcode || ''}
        </div>
        <div style="max-height: 180px; overflow-y: auto; margin-bottom: 15px;">
          ${layoutItems}
        </div>
        <div style="text-align: right;">
          <a href="/api/v1/orders/${orderId}/receipt/download" class="btn btn-outline" style="padding: 5px 15px; font-size: 0.85rem; text-decoration: none;">Download Official Receipt</a>
        </div>
      `;
    } catch (err) {
      target.innerHTML = '<p style="color: red;">Failed to retrieve order layout data metrics.</p>';
    }
  };

  window.openReviewModal = function(orderId) {
    const modal = document.getElementById('portalModal');
    const target = document.getElementById('modalPortalTarget');
    modal.style.display = 'flex';

    target.innerHTML = `
      <h3 style="color: var(--accent); margin-top: 0; margin-bottom: 5px;">Write a Component Review</h3>
      <p class="muted" style="font-size: 0.8rem; margin-bottom: 15px;">Submitting experience breakdown for Manifest order item #${orderId}</p>
      <form id="portalReviewForm">
        <div style="margin-bottom: 12px;">
          <label style="display:block; margin-bottom:5px; font-size:0.85rem;">Score Assessment</label>
          <select id="revScore" style="width:100%; background:#221d30; color:#fff; border:1px solid rgba(168,107,255,0.3); padding:8px; border-radius:4px;">
            <option value="5">⭐⭐⭐⭐⭐ (5) Outstanding Quality</option>
            <option value="4">⭐⭐⭐⭐ (4) Good/Reliable</option>
            <option value="3">⭐⭐⭐ (3) Satisfactory</option>
            <option value="2">⭐⭐ (2) Subpar Component</option>
            <option value="1">⭐ (1) Highly Defective</option>
          </select>
        </div>
        <div style="margin-bottom: 15px;">
          <label style="display:block; margin-bottom:5px; font-size:0.85rem;">Written Review Commentary</label>
          <textarea id="revComment" rows="4" style="width:100%; background:#221d30; color:#fff; border:1px solid rgba(168,107,255,0.3); padding:8px; border-radius:4px; resize:none;" placeholder="Detail your performance observations regarding this item..."></textarea>
        </div>
        <button type="submit" class="btn" style="width:100%;">Post Review Manifest</button>
      </form>
    `;

    document.getElementById('portalReviewForm').onsubmit = async function(e) {
      e.preventDefault();
      const rating = document.getElementById('revScore').value;
      const comment = document.getElementById('revComment').value;

      try {
        // Point to your centralized backend review implementation path configuration endpoint
      await axios.post('/api/v1/reviews', { orderId, rating, comment });        
      notify('Review submitted successfully! Thank you for your feedback.', 'success');
        closePortalModal();
      } catch (err) {
        notify(err.response?.data?.message || 'Review noted! Check route parameters connection status configurations.', 'error');
        closePortalModal();
      }
    };
  };

  window.closePortalModal = function() {
    document.getElementById('portalModal').style.display = 'none';
    document.getElementById('modalPortalTarget').innerHTML = '';
  };
</script>
</body>
</html>
