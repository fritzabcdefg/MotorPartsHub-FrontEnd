<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Dashboard - MotorPartsHub</title>
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/jquery.dataTables.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="header"></div>
  <main class="card">
    <h1>Admin Dashboard</h1>
    <nav id="adminPanelNav" class="admin-panel-nav" style="margin-bottom:16px;">
      <a class="admin-panel-link" href="#admin-users">User Management</a>
      <a class="admin-panel-link" href="#admin-inventory">Inventory Management</a>
      <a class="admin-panel-link" href="#admin-orders">Orders Management</a>
      <a class="admin-panel-link" href="#admin-reviews">Review Management</a>
      <a class="admin-panel-link" href="#admin-categories">Categories Management</a>
    </nav>
    <div id="dashboardRoot"></div>
  </main>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/user.js"></script>
  <script src="/js/inventory.js"></script>
  <script src="/js/orders.js"></script>
  <script src="/js/dashboard.js"></script>
  <script src="/header.js"></script>
  <script>
    fetch('/header.html')
      .then(r => r.text())
      .then(t => {
        document.getElementById('header').innerHTML = t;
        if (window.initHeaderNav) window.initHeaderNav();
      });
  </script>
</body>
</html>
