<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Profile - MotorPartsHub</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div id="header"></div>
  <main class="card">
    <h1>Your Profile</h1>
    <div id="profileRoot"></div>
  </main>
  <script src="header.js"></script>
  <script src="../js/user.js"></script>
  <script>
    fetch('header.html')
      .then(r => r.text())
      .then(t => {
        document.getElementById('header').innerHTML = t;
        if (window.initHeaderNav) window.initHeaderNav();
      });
  </script>
</body>
</html>
