<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Setup Profile - MotorPartsHub</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { background-color: #05020a; color: #ffffff; font-family: 'Segoe UI', sans-serif; padding: 20px; }
    .card { background-color: #090314; border: 1px solid rgba(168, 107, 255, 0.2); border-radius: 12px; padding: 28px; max-width: 600px; margin: 40px auto; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.7); }
    h1 { color: #a86bff; border-bottom: 2px solid rgba(168, 107, 255, 0.15); padding-bottom: 10px; }
    .form-row { display: flex; gap: 16px; margin-bottom: 12px; }
    .form-group { flex: 1; display: flex; flex-direction: column; }
    label { margin-bottom: 6px; font-size: 0.9rem; color: #b3a1d9; }
    input, select { background: #120b24; border: 1px solid rgba(168, 107, 255, 0.2); color: #fff; padding: 10px; border-radius: 6px; }
    input:focus, select:focus { border-color: #a86bff; outline: none; }
    input[type="submit"] { background: #a86bff; font-weight: bold; cursor: pointer; margin-top: 15px; }
    input[type="submit"]:hover { background: #b57fff; }
    /* ADDED: avatar upload styling */
    .avatar-row { display: flex; align-items: center; gap: 16px; margin-bottom: 16px; }
    #avatarPreview { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(168, 107, 255, 0.4); background: #120b24; }
    .avatar-upload-label { display: inline-block; background: #120b24; border: 1px solid rgba(168, 107, 255, 0.3); color: #b3a1d9; padding: 8px 14px; border-radius: 6px; cursor: pointer; font-size: 0.9rem; }
    .avatar-upload-label:hover { border-color: #a86bff; color: #fff; }
    #avatarUpload { display: none; }
  </style>
</head>
<body>
  <div id="header"></div>
  <div class="card">
    <h1>Complete Your Profile</h1>
    <p>Your email has been verified! Let's complete your customer record file settings.</p>
    
    <form id="profileForm">

      <!-- ADDED: avatar upload section -->
      <div class="avatar-row">
        <img id="avatarPreview" src="/img/default-avatar.png" alt="Profile Avatar">
        <div>
          <label for="avatarUpload" class="avatar-upload-label">Choose Photo</label>
          <input type="file" id="avatarUpload" accept="image/*">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group" style="flex: 0 0 100px;">
          <label for="title">Title</label>
          <select id="title">
            <option value="Mr.">Mr.</option>
            <option value="Ms.">Ms.</option>
            <option value="Mrs.">Mrs.</option>
          </select>
        </div>
        <div class="form-group">
          <label for="fname">First Name</label>
          <input id="fname" type="text" required>
        </div>
        <div class="form-group">
          <label for="lname">Last Name</label>
          <input id="lname" type="text" required>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input id="phone" type="text" placeholder="e.g. 09123456789">
        </div>
      </div>

      <div class="form-group" style="margin-bottom: 12px;">
        <label for="addressline">Address Line</label>
        <input id="addressline" type="text" placeholder="Street name, Barangay" required>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="town">Town / City</label>
          <input id="town" type="text" required>
        </div>
        <div class="form-group">
          <label for="zipcode">Zip Code</label>
          <input id="zipcode" type="text">
        </div>
      </div>

      <input type="submit" value="Save Profile & Continue">
    </form>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

  <!-- Global Notification System — must load before any script that calls notify() -->
  <script src="/js/notify.js"></script>

  <script>
    // ADDED: attach JWT token to every axios request (matches profile.html)
    axios.interceptors.request.use((config) => {
      const token = localStorage.getItem('token');
      if (token) config.headers.Authorization = `Bearer ${token}`;
      return config;
    });

    // 1. Extract variables directly from URL parameters injected by backend redirect
    const urlParams = new URLSearchParams(window.location.search);
    let token = urlParams.get('token');
    let userId = urlParams.get('userId');
    let email = urlParams.get('email');

    // 2. FALLBACK CHECK: If parameters exist in URL, save them. If not, recover them from localStorage.
    if (token && userId) {
        localStorage.setItem('token', token);
        localStorage.setItem('user', JSON.stringify({ id: userId, email: email, role: 'user' }));
    } else {
        token = localStorage.getItem('token');
        const savedUser = JSON.parse(localStorage.getItem('user') || '{}');
        userId = savedUser.id;
        email = savedUser.email;
    }

    // Safety warning if the user accessed this page without a valid activation session link
    if (!userId) {
        notify('Session tracking lost. Please open the activation link sent to your email again.', 'warning');
    }

    // 3. Load Guest Header layout
    fetch('/header-guest.html').then(r=>r.text()).then(t=>{document.getElementById('header').innerHTML=t});

    // ADDED: avatar file selection + live preview
    let uploadedFile = null;
    const avatarUpload = document.getElementById('avatarUpload');
    const avatarPreview = document.getElementById('avatarPreview');

    avatarUpload.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            uploadedFile = file;
            const reader = new FileReader();
            reader.onload = (e) => avatarPreview.src = e.target.result;
            reader.readAsDataURL(file);
        }
    });

    // 4. Form Submission Logic
    document.getElementById('profileForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        // Prevent pushing empty string values down the wire if verification session failed
        if (!userId) {
            notify('Cannot submit: Your User ID is missing. Please re-open the activation link from your email.', 'warning');
            return;
        }

        // CHANGED: build FormData instead of a plain JSON object, so the avatar file
        // can travel in the same request (multipart/form-data required for file uploads)
        const formData = new FormData();
        formData.append('userId', userId);
        formData.append('title', document.getElementById('title').value);
        formData.append('fname', document.getElementById('fname').value);
        formData.append('lname', document.getElementById('lname').value);
        formData.append('phone', document.getElementById('phone').value);
        formData.append('addressline', document.getElementById('addressline').value);
        formData.append('town', document.getElementById('town').value);
        formData.append('zipcode', document.getElementById('zipcode').value);

        if (uploadedFile) {
            formData.append('avatar', uploadedFile);
        }

        try {
            // CHANGED: send formData with multipart header instead of JSON
            const res = await axios.post('/api/v1/setup-profile', formData, {
                headers: { 'Content-Type': 'multipart/form-data' }
            });
            if (res.data.success) {
                // FIX: Instantly inject the newly filled name into local storage session data
                const savedUser = JSON.parse(localStorage.getItem('user') || '{}');
                savedUser.name = `${document.getElementById('fname').value} ${document.getElementById('lname').value}`;
                localStorage.setItem('user', JSON.stringify(savedUser));

                // Force header updates to read the change immediately
                window.dispatchEvent(new Event('auth:changed'));

                notify('Profile configured completely!', 'success');
                // Give the toast a moment to display before navigating away
                setTimeout(() => window.location.replace('/home.html'), 1200);
            }
        } catch (err) {
            notify(err.response?.data?.message || 'Failed saving customer data details.', 'error');
        }
    });
</script>
</body>
</html>
